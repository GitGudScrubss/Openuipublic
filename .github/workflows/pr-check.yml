# Runs on every pull request into main to make sure the build isn't broken.
# Type-checks, runs the unit tests, and builds the app shell on Linux (fast, no
# packaging step). The test step guards the highest-risk logic — the filesystem
# path-safety gate and the tool-call parser that decides what the LLM may run.
name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
