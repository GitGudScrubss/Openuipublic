# Manual diagnostic — confirms the publishable build secrets are actually
# reaching GitHub Actions BEFORE you cut a real release tag. It prints only
# each secret's PRESENCE and length (never the value), so it is safe to read.
#
# Run it from the GitHub UI: Actions → "Verify release secrets" → Run workflow.
# A green run means the next `v*` tag will bake Supabase config into the app and
# Google sign-in will work. A red run tells you exactly which secret is missing.
name: Verify release secrets

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret presence (no values printed)
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
          VITE_STRIPE_PRO_PRICE_ID: ${{ secrets.VITE_STRIPE_PRO_PRICE_ID }}
          VITE_STRIPE_ENTERPRISE_PRICE_ID: ${{ secrets.VITE_STRIPE_ENTERPRISE_PRICE_ID }}
        run: |
          fail=0
          check() {
            local name="$1" required="$2" val="${!1}"
            if [ -z "$val" ]; then
              if [ "$required" = "required" ]; then
                echo "::error::$name is EMPTY (REQUIRED for Google sign-in)"; fail=1
              else
                echo "::warning::$name is empty (optional)"
              fi
            else
              echo "OK  $name present (length ${#val})"
            fi
          }
          # Required for auth to work in the packaged app:
          check SUPABASE_URL      required
          check SUPABASE_ANON_KEY required
          # Optional analytics / billing config:
          check POSTHOG_API_KEY                optional
          check POSTHOG_HOST                   optional
          check VITE_STRIPE_PRO_PRICE_ID       optional
          check VITE_STRIPE_ENTERPRISE_PRICE_ID optional
          if [ "$fail" -ne 0 ]; then
            echo "::error::Required secrets are missing — fix them before releasing."
            exit 1
          fi
          echo "All required secrets are present. Safe to cut a release tag."
