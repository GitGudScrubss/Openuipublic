# ─────────────────────────────────────────────────────────────────────────────
# Build and Release — builds OpenUI for macOS + Windows and publishes the
# installers AND the electron-updater feed metadata to a GitHub Release
# whenever a version tag (v*) is pushed.
#
#   git tag v0.1.0
#   git push origin v0.1.0
#
# AUTO-UPDATE NOTE: electron-updater discovers new versions by reading the
# channel files that electron-builder generates next to the installers:
#   • macOS  → latest-mac.yml
#   • Windows → latest.yml
# and applies differential (delta) Windows updates from the *.blockmap files.
# These MUST be uploaded to the Release alongside the .dmg/.exe — without them
# the app has no feed to poll and auto-update silently does nothing. The globs
# below upload all three (installer + .yml + .blockmap) for each platform.
#
# REQUIRED GitHub Secrets (Settings → Secrets and variables → Actions):
#   These are baked into the packaged build at compile time. Without them the
#   shipped app cannot reach Supabase, so Google sign-in fails with
#   "Cannot start auth — SUPABASE_URL is not set." They are PUBLISHABLE values
#   (the anon/publishable key is designed to ship in clients — NOT the
#   service-role key), so it is safe to inline them into the binary.
#     SUPABASE_URL
#     SUPABASE_ANON_KEY
#
# OPTIONAL GitHub Secrets (Settings → Secrets and variables → Actions):
#   These let the packaged build ship with the Stripe price IDs inlined. They
#   are NOT secret (public SKU-like values) but are kept in Actions secrets for
#   convenience. If unset, the UI shell still builds fine — pricing buttons just
#   resolve to undefined price IDs and the upgrade/checkout flow is disabled.
#     VITE_STRIPE_PRO_PRICE_ID
#     VITE_STRIPE_ENTERPRISE_PRICE_ID
#
#   Do NOT add real Anthropic/OpenAI/Supabase SERVICE-ROLE/Stripe SECRET keys
#   here — those are runtime-only and live in the user's local .env or the
#   Supabase Edge Function secrets, never in the shipped binary.
#
#   GITHUB_TOKEN is provided automatically by Actions — no setup required.
#
#   Optional PostHog telemetry (runtime — not baked into the binary):
#     POSTHOG_API_KEY    — PostHog project API key (phc_…)
#     POSTHOG_HOST       — PostHog ingest host (default: https://us.i.posthog.com)
#   If unset, telemetry is silently disabled in the shipped build.
# ─────────────────────────────────────────────────────────────────────────────
name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Preflight: fail LOUDLY if publishable build secrets are missing ──────
      # SUPABASE_URL / SUPABASE_ANON_KEY are baked into the main bundle at build
      # time (see electron.vite.config.ts). When they are empty, Google sign-in
      # silently breaks in the shipped app ("SUPABASE_URL is not set"). Fail the
      # release NOW — with a clear message — instead of shipping a broken binary.
      - name: Verify required build secrets are present
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          missing=0
          for name in SUPABASE_URL SUPABASE_ANON_KEY; do
            val="${!name}"
            if [ -z "$val" ]; then
              echo "::error::$name is EMPTY — add it as a *Repository* secret on Satyabrat2005/Openui (Settings → Secrets and variables → Actions)."
              missing=1
            else
              echo "$name is present (length ${#val})."
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "::error::Refusing to build a release with missing auth secrets — Google sign-in would be broken in the shipped app."
            exit 1
          fi
          echo "All required build secrets are present."

      - name: Build macOS DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        # electron-builder fetches its packaging binaries (winCodeSign, nsis, …)
        # at build time, and that host intermittently returns 502/timeouts — this
        # has broken past releases. Retry the whole build so a transient download
        # blip can't fail a release; already-downloaded binaries are cached, so a
        # retry is cheap. A genuine error still fails all 3 attempts and surfaces.
        run: |
          for attempt in 1 2 3; do
            echo "::group::build:mac attempt $attempt"
            if npm run build:mac; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "::warning::build:mac failed on attempt $attempt (often a transient electron-builder binary download — 502/timeout). Retrying in 30s…"
            sleep 30
          done
          echo "::error::build:mac failed after 3 attempts."
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Supabase URL + anon key are PUBLISHABLE (safe to ship) and are baked
          # into the main bundle so Google sign-in works in the packaged app.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_STRIPE_PRO_PRICE_ID: ${{ secrets.VITE_STRIPE_PRO_PRICE_ID }}
          VITE_STRIPE_ENTERPRISE_PRICE_ID: ${{ secrets.VITE_STRIPE_ENTERPRISE_PRICE_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}

      # hnswlib-node (RAG vector index) cannot be rebuilt against Electron's ABI
      # on the Windows runner (C2666 under the runner's MSVC), and there is no
      # newer release that fixes it. It is an optionalDependency, so remove it
      # before packaging — electron-builder then skips it and rag.ts degrades
      # gracefully (RAG ships on macOS only for now). Without this the whole
      # Windows installer build fails.
      - name: Drop hnswlib-node before packaging (Windows — RAG disabled)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: rm -rf node_modules/hnswlib-node

      - name: Build Windows EXE
        if: matrix.os == 'windows-latest'
        shell: bash
        # Same transient-download hardening as macOS: an HTTP 502 from
        # electron-builder's NSIS binary host (nsis-resources-*.7z) failed the
        # v7.0.1 Windows build even though packaging itself was fine. Retry so a
        # flaky download can't break the release.
        run: |
          for attempt in 1 2 3; do
            echo "::group::build:win attempt $attempt"
            if npm run build:win; then echo "::endgroup::"; exit 0; fi
            echo "::endgroup::"
            echo "::warning::build:win failed on attempt $attempt (often a transient electron-builder binary download — 502/timeout). Retrying in 30s…"
            sleep 30
          done
          echo "::error::build:win failed after 3 attempts."
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Supabase URL + anon key are PUBLISHABLE (safe to ship) and are baked
          # into the main bundle so Google sign-in works in the packaged .exe.
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_STRIPE_PRO_PRICE_ID: ${{ secrets.VITE_STRIPE_PRO_PRICE_ID }}
          VITE_STRIPE_ENTERPRISE_PRICE_ID: ${{ secrets.VITE_STRIPE_ENTERPRISE_PRICE_ID }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}

      # Upload the installer, the electron-updater channel file (latest-mac.yml)
      # and the differential-update blockmaps so the publish job can attach them.
      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: warn

      # Upload the installer, the channel file (latest.yml) and the *.exe
      # blockmaps that drive Windows delta updates.
      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: warn

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: ./artifacts/mac

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./artifacts/win

      # Attach EVERY file (installers + .yml feeds + .blockmap deltas) to the
      # Release. The .yml files are what electron-updater polls; omitting them
      # breaks auto-update entirely.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/mac/*.dmg
            ./artifacts/mac/latest*.yml
            ./artifacts/mac/*.blockmap
            ./artifacts/win/*.exe
            ./artifacts/win/latest*.yml
            ./artifacts/win/*.blockmap
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
